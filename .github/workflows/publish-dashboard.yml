# Refreshes dashboard/data.json from Open States and deploys dashboard/ to GitHub Pages.
#
# One-time repo setup:
#   1. Settings → Secrets and variables → Actions → New repository secret: OPENSTATES_API_KEY
#   2. Optional repository variables (same screen, Variables tab): SEARCH_QUERIES, JURISDICTIONS, WATCH_BILLS
#   3. Optional secret SLACK_WEBHOOK_URL if you want Slack alerts from scheduled runs too
#   4. Settings → Pages → Build and deployment → Source: GitHub Actions
#
# tracker_state.db is cached between runs so alerts stay incremental (not "every bill is new" each day).
# Push triggers use Open States quota on each merge to the default branch; adjust branches if yours differs.

name: Publish legislation dashboard

on:
  push:
    branches: [main, master]
  schedule:
    # Daily ~15:00 UTC; edit if you prefer another window
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: tracker_state.db
          key: tracker-state-db

      - name: Poll Open States and write dashboard/data.json
        env:
          OPENSTATES_API_KEY: ${{ secrets.OPENSTATES_API_KEY }}
          SEARCH_QUERIES: ${{ vars.SEARCH_QUERIES }}
          JURISDICTIONS: ${{ vars.JURISDICTIONS }}
          WATCH_BILLS: ${{ vars.WATCH_BILLS }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -f tracker_state.db ]; then
            python tracker.py
          else
            python tracker.py --bootstrap
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - id: deployment
        uses: actions/deploy-pages@v4
